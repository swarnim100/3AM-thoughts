<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" role="img" aria-label="Architecture diagram">
  <defs>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#1a1525"/>
      <stop offset="100%" style="stop-color:#0f0d14"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8b5cf6"/>
    </marker>
  </defs>
  <rect width="900" height="320" fill="#07060d" rx="12"/>
  <text x="450" y="36" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#71717a" letter-spacing="0.12em">SYSTEM OVERVIEW</text>
  <!-- Browser -->
  <rect x="40" y="70" width="200" height="100" rx="14" fill="url(#box)" stroke="#3f3f46" stroke-width="1"/>
  <text x="140" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#fafafa" font-weight="600">Browser</text>
  <text x="140" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#a1a1aa">Next.js · React</text>
  <text x="140" y="152" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b5cf6">:3000</text>
  <!-- API -->
  <rect x="350" y="70" width="200" height="100" rx="14" fill="url(#box)" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="450" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#fafafa" font-weight="600">FastAPI</text>
  <text x="450" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#a1a1aa">Python · Uvicorn</text>
  <text x="450" y="152" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b5cf6">:8000</text>
  <!-- OpenAI -->
  <rect x="660" y="70" width="200" height="100" rx="14" fill="url(#box)" stroke="#3f3f46" stroke-width="1"/>
  <text x="760" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#fafafa" font-weight="600">OpenAI</text>
  <text x="760" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#a1a1aa">gpt-4o-mini</text>
  <text x="760" y="152" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#71717a">Chat API</text>
  <!-- Arrows -->
  <line x1="240" y1="120" x2="340" y2="120" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="290" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#71717a">POST /chat</text>
  <line x1="550" y1="120" x2="650" y2="120" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="600" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#71717a">completions</text>
  <!-- Landing preview box -->
  <rect x="40" y="210" width="380" height="90" rx="12" fill="#0f0d14" stroke="#27272a"/>
  <text x="60" y="238" font-family="system-ui,sans-serif" font-size="13" fill="#e9d5ff">Landing page</text>
  <text x="60" y="260" font-family="system-ui,sans-serif" font-size="11" fill="#71717a">Hero · Features · Routines · CTA</text>
  <text x="60" y="280" font-family="system-ui,sans-serif" font-size="11" fill="#71717a">Tailwind · Framer Motion · Dark theme</text>
  <!-- Env box -->
  <rect x="480" y="210" width="380" height="90" rx="12" fill="#0f0d14" stroke="#27272a"/>
  <text x="500" y="238" font-family="system-ui,sans-serif" font-size="13" fill="#e9d5ff">backend/.env</text>
  <text x="500" y="260" font-family="system-ui,sans-serif" font-size="11" fill="#71717a">OPENAI_API_KEY (gitignored)</text>
  <text x="500" y="280" font-family="system-ui,sans-serif" font-size="11" fill="#71717a">Emotional recovery system prompt</text>
</svg>
