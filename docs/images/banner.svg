<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-label="3 AM Thoughts">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07060d"/>
      <stop offset="50%" style="stop-color:#120a1f"/>
      <stop offset="100%" style="stop-color:#07060d"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="25%" r="45%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="70%" r="40%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ddd6fe"/>
      <stop offset="50%" style="stop-color:#f5d0fe"/>
      <stop offset="100%" style="stop-color:#c7d2fe"/>
